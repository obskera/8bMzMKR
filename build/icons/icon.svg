<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" shape-rendering="crispEdges">
  <rect width="1024" height="1024" fill="#0f172a"/>

  <!-- subtle checker backdrop -->
  <rect x="0" y="0" width="512" height="512" fill="#111c34"/>
  <rect x="512" y="512" width="512" height="512" fill="#111c34"/>

  <!-- large eighth note -->
  <rect x="256" y="160" width="112" height="544" fill="#f8fafc"/>
  <rect x="352" y="160" width="304" height="112" fill="#f8fafc"/>
  <rect x="528" y="432" width="256" height="224" fill="#fb923c"/>
  <rect x="496" y="464" width="32" height="160" fill="#fb923c"/>
  <rect x="784" y="464" width="32" height="160" fill="#fb923c"/>

  <!-- small accent note -->
  <rect x="640" y="288" width="64" height="256" fill="#22d3ee"/>
  <rect x="704" y="288" width="160" height="64" fill="#22d3ee"/>
  <rect x="784" y="480" width="128" height="112" fill="#06b6d4"/>

  <!-- pixel border -->
  <rect x="0" y="0" width="1024" height="32" fill="#e2e8f0"/>
  <rect x="0" y="992" width="1024" height="32" fill="#e2e8f0"/>
  <rect x="0" y="0" width="32" height="1024" fill="#e2e8f0"/>
  <rect x="992" y="0" width="32" height="1024" fill="#e2e8f0"/>
</svg>
